<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brindavan Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #1DB954; --bg: #050505; --glass: rgba(255,255,255,0.05); }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Smooth Top Bar */
        .nav { position: sticky; top: 0; backdrop-filter: blur(20px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass); z-index: 100; }
        .search-input { background: var(--glass); border: 1px solid #222; padding: 10px 20px; border-radius: 20px; color: white; width: 300px; transition: 0.3s; }
        .search-input:focus { border-color: var(--accent); width: 350px; outline: none; }

        /* Public Sync Bar */
        .sync-zone { display: flex; gap: 10px; padding: 20px 5%; justify-content: center; background: linear-gradient(to bottom, #111, transparent); }
        .sync-btn { background: var(--accent); border: none; padding: 8px 18px; border-radius: 15px; font-weight: bold; cursor: pointer; }

        /* Song Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; padding: 30px 5%; }
        .card { background: var(--glass); padding: 15px; border-radius: 15px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }
        .card:hover { transform: scale(1.05); background: rgba(255,255,255,0.1); }
        .card img { width: 100%; border-radius: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        /* Floating Add Button */
        .add-btn { position: absolute; bottom: 60px; right: 25px; background: var(--accent); color: black; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transform: translateY(10px); transition: 0.3s; }
        .card:hover .add-btn { opacity: 1; transform: translateY(0); }

        /* Floating Player */
        .player { position: fixed; bottom: 20px; left: 5%; right: 5%; background: rgba(15,15,15,0.9); backdrop-filter: blur(25px); border: 1px solid var(--glass); border-radius: 20px; padding: 15px 30px; display: flex; align-items: center; gap: 20px; }
    </style>
</head>
<body>

<div class="nav">
    <h2 style="letter-spacing: -1px;">Brindavan <span style="color:var(--accent)">PRO</span></h2>
    <input type="text" id="search" class="search-input" placeholder="Search Artists, Songs..." onkeyup="if(event.key==='Enter')searchMusic()">
</div>

<div class="sync-zone">
    <input type="text" id="sync-key" class="search-input" style="width:200px" placeholder="Global Playlist Name">
    <button class="sync-btn" onclick="savePlaylist()">Publicize</button>
    <button class="sync-btn" style="background:#444; color:white;" onclick="loadPlaylist()">Fetch</button>
</div>

<div class="grid" id="grid"></div>

<div class="player">
    <img id="p-img" src="" style="width:50px; border-radius:8px">
    <div style="flex:1"><div id="p-title">Not Playing</div><div id="p-artist" style="font-size:12px; color:#888">Select a track</div></div>
    <div style="display:flex; gap:20px; font-size:20px;">
        <i class="fa-solid fa-backward" onclick="prev()"></i>
        <i class="fa-solid fa-play" id="play-btn" onclick="togglePlay()"></i>
        <i class="fa-solid fa-forward" onclick="next()"></i>
    </div>
</div>

<audio id="audio"></audio>
<script src="js/pro.js"></script>
</body>
</html>
